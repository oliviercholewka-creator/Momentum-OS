<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Momentum OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0c0c0e;
            --card: #141417;
            --border: #232326;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 100px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* Header UI */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
        }

        .logo-area h1 { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
        .logo-area p { color: var(--text-secondary); font-size: 0.9rem; }

        .total-momentum {
            text-align: right;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Entry Card */
        .entry-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 100px;
            gap: 15px;
            align-items: end;
        }

        label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        input {
            background: #1c1c20;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        button#log-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button#log-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Table UI */
        .table-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #1c1c20;
            text-align: left;
            padding: 15px 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td { border-bottom: none; }

        .tag-points {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row-animate { animation: slideUp 0.4s ease forwards; }
        /* Auth Overlay Styles */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 12, 14, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .auth-card h2 { margin-bottom: 10px; font-size: 1.5rem; }
        .auth-card p { color: var(--text-secondary); margin-bottom: 25px; font-size: 0.9rem; }
        
        .auth-input-group { margin-bottom: 15px; text-align: left; }
        
        .auth-toggle {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .auth-toggle span {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        .hidden { display: none !important; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Password">
        <button onclick="handleAuth()">Continue</button>
        <p style="cursor:pointer; font-size: 0.8rem; margin-top: 15px;" onclick="toggleAuthMode()" id="toggle-text">Don't have an account? Sign Up</p>
    </div>
</div>

<div class="container">
    <h1>MOMENTUM OS</h1>
    <div class="entry-section">
        <input type="date" id="task-date">
        <input type="text" id="task-name" placeholder="Task Name">
        <input type="number" id="task-time" placeholder="Minutes">
        <button id="log-btn" onclick="addTask()">LOG</button>
    </div>
    <table>
        <thead><tr><th>Date</th><th>Task</th><th>Time</th><th>Momentum</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
    <h2 id="total-score-display">0</h2>
</div>

<script>
    // 1. Initialize Supabase
    // REPLACE WITH YOUR NEW KEYS
    const supabase = supabase.createClient('https://gmyveydvfikustdfsndv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXZleWR2ZmlrdXN0ZGZzbmR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjIzOTIsImV4cCI6MjA4ODgzODM5Mn0.Qt90bt8OOAb1u26cEupc7HSY50Yz4OaDYWlOhNPOR-M');
    
    let isSignUp = false;
    let tasks = [];

    // 2. Authentication Logic
    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').innerText = isSignUp ? "Create Account" : "Welcome Back";
        document.getElementById('toggle-text').innerText = isSignUp ? "Already have an account? Login" : "Don't have an account? Sign Up";
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        if (isSignUp) {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message); else alert("Check your email!");
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Invalid login");
            else location.reload();
        }
    }

    // 3. Database Logic
    async function fetchTasks() {
        const { data, error } = await supabase.from('tasks').select('*').order('date', { ascending: false });
        if (error) console.error(error);
        else { tasks = data; updateUI(); }
    }

    async function addTask() {
        const user = await supabase.auth.getUser();
        const date = document.getElementById('task-date').value;
        const name = document.getElementById('task-name').value;
        const time = parseInt(document.getElementById('task-time').value);

        const { error } = await supabase.from('tasks').insert([{ user_id: user.data.user.id, date, name, time }]);
        if (error) alert(error.message); else fetchTasks();
    }

    // 4. Initialization
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('auth-overlay').classList.add('hidden');
            fetchTasks();
        }
    });

    function updateUI() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        tasks.forEach(t => {
            tbody.innerHTML += `<tr><td>${t.date}</td><td>${t.name}</td><td>${t.time}</td><td>+${t.time < 15 ? 5 : Math.floor(t.time/2)}</td></tr>`;
        });
    }
</script>
</body>
</html>

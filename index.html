<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum OS | Deep Work Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0e;
            --card: #141417;
            --border: #232326;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 100px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        /* Header UI */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
        }

        .logo-area h1 { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
        .logo-area p { color: var(--text-secondary); font-size: 0.9rem; }

        .total-momentum {
            text-align: right;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Entry Card */
        .entry-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 100px;
            gap: 15px;
            align-items: end;
        }

        label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        input {
            background: #1c1c20;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        button#log-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button#log-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Table UI */
        .table-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #1c1c20;
            text-align: left;
            padding: 15px 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td { border-bottom: none; }

        .tag-points {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row-animate { animation: slideUp 0.4s ease forwards; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1>MOMENTUM OS</h1>
            <p>System status: <span style="color: var(--success)">Optimal</span></p>
        </div>
        <div class="total-momentum">
            <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); -webkit-text-fill-color: initial;">Total Score</p>
            <h2 id="total-score-display" style="font-size: 2.5rem;">0</h2>
        </div>
    </header>

    <div class="entry-section">
        <div class="input-group">
            <div>
                <label>Date</label>
                <input type="date" id="task-date">
            </div>
            <div>
                <label>Task Name</label>
                <input type="text" id="task-name" placeholder="E.g. Database Design">
            </div>
            <div>
                <label>Minutes</label>
                <input type="number" id="task-time" placeholder="Mins">
            </div>
            <button id="log-btn" onclick="addTask()">LOG</button>
        </div>
    </div>

    <div class="table-container">
        <table id="momentum-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Task</th>
                    <th>Time</th>
                    <th>Momentum</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        <div id="empty-msg" class="empty-state">No execution logs found. Start working to build momentum.</div>
    </div>
</div>

<script>
    // Initialize State
    let tasks = JSON.parse(localStorage.getItem('momentum_tasks')) || [];
    let totalScore = 0;

    // Set default date to today
    document.getElementById('task-date').valueAsDate = new Date();

    function calculatePoints(minutes) {
        if (minutes <= 0) return 0;
        // Logic: 5 base points + proportional growth
        if (minutes < 15) return 5;
        if (minutes < 60) return Math.floor(minutes / 2);
        return Math.floor(30 + (minutes / 10)); // Deep work bonus
    }

    function updateUI() {
        const tbody = document.getElementById('table-body');
        const emptyMsg = document.getElementById('empty-msg');
        const scoreDisplay = document.getElementById('total-score-display');
        
        tbody.innerHTML = '';
        totalScore = 0;

        if (tasks.length === 0) {
            emptyMsg.style.display = 'block';
        } else {
            emptyMsg.style.display = 'none';
        }

        tasks.sort((a, b) => new Date(b.date) - new Date(a.date));

        tasks.forEach((task, index) => {
            const row = document.createElement('tr');
            row.className = 'row-animate';
            const points = calculatePoints(task.time);
            totalScore += points;

            row.innerHTML = `
                <td style="color: var(--text-secondary)">${task.date}</td>
                <td style="font-weight: 600">${task.name}</td>
                <td>${task.time} mins</td>
                <td><span class="tag-points">+${points}</span></td>
            `;
            tbody.appendChild(row);
        });

        scoreDisplay.textContent = totalScore;
    }

    function addTask() {
        const dateInput = document.getElementById('task-date').value;
        const nameInput = document.getElementById('task-name').value;
        const timeInput = document.getElementById('task-time').value;

        if (!dateInput || !nameInput || !timeInput) {
            alert("Please fill all fields to generate momentum.");
            return;
        }

        const newTask = {
            date: dateInput,
            name: nameInput,
            time: parseInt(timeInput)
        };

        tasks.push(newTask);
        localStorage.setItem('momentum_tasks', JSON.stringify(tasks));
        
        // Reset inputs
        document.getElementById('task-name').value = '';
        document.getElementById('task-time').value = '';
        
        updateUI();
    }

    // Initial Load
    updateUI();
    // new version
</script>

</body>
</html>

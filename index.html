<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Momentum OS | Deep Work Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Keep your existing CSS here */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 id="auth-title">Welcome Back</h2>
        <div class="auth-input-group">
            <label>Email</label>
            <input type="email" id="auth-email">
        </div>
        <div class="auth-input-group">
            <label>Password</label>
            <input type="password" id="auth-password">
        </div>
        <button id="log-btn" onclick="handleAuth()">Continue</button>
        <div class="auth-toggle">
            <span id="toggle-text" onclick="toggleAuthMode()">Don't have an account? Sign Up</span>
        </div>
    </div>
</div>

<div class="container">
    </div>

<script>
    // 1. INITIALIZE SUPABASE
    const supabase = supabase.createClient('https://gmyveydvfikustdfsndv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXZleWR2ZmlrdXN0ZGZzbmR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjIzOTIsImV4cCI6MjA4ODgzODM5Mn0.Qt90bt8OOAb1u26cEupc7HSY50Yz4OaDYWlOhNPOR-M');
    
    let tasks = [];
    let isSignUp = false;

    // 2. AUTHENTICATION LOGIC
    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').innerText = isSignUp ? "Create Account" : "Welcome Back";
        document.getElementById('toggle-text').innerText = isSignUp ? "Already have an account? Login" : "Don't have an account? Sign Up";
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        if (isSignUp) {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message); else alert("Check your email!");
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Invalid credentials");
        }
    }

    // 3. DATABASE LOGIC
    async function fetchTasks() {
        const { data, error } = await supabase
            .from('tasks')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) console.error(error);
        else {
            tasks = data;
            updateUI();
        }
    }

    async function addTask() {
        const user = await supabase.auth.getUser();
        const dateInput = document.getElementById('task-date').value;
        const nameInput = document.getElementById('task-name').value;
        const timeInput = parseInt(document.getElementById('task-time').value);

        if (!dateInput || !nameInput || !timeInput) return;

        const { error } = await supabase.from('tasks').insert([
            { user_id: user.data.user.id, date: dateInput, name: nameInput, time: timeInput }
        ]);

        if (error) alert(error.message);
        else {
            document.getElementById('task-name').value = '';
            document.getElementById('task-time').value = '';
            fetchTasks();
        }
    }

    // 4. APP INITIALIZATION
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('auth-overlay').classList.add('hidden');
            fetchTasks();
        }
    });

    function updateUI() {
        const tbody = document.getElementById('table-body');
        const scoreDisplay = document.getElementById('total-score-display');
        tbody.innerHTML = '';
        let totalScore = 0;

        tasks.forEach(task => {
            const points = task.time < 15 ? 5 : Math.floor(task.time / 2);
            totalScore += points;
            tbody.innerHTML += `<tr><td>${task.date}</td><td>${task.name}</td><td>${task.time}</td><td>+${points}</td></tr>`;
        });
        scoreDisplay.textContent = totalScore;
    }
</script>
</body>
</html>

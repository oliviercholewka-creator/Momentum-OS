<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum OS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#09090b;
--card-bg:#18181b;
--border:#27272a;
--text:#fafafa;
--text-dim:#a1a1aa;
--accent:#3b82f6;
--success:#10b981;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
border-bottom:1px solid var(--border);
padding-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(12,1fr);
gap:20px;
}

.card{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:12px;
padding:24px;
}

.col-8{grid-column:span 8;}
.col-6{grid-column:span 6;}
.col-4{grid-column:span 4;}
.col-12{grid-column:span 12;}

h2{margin-bottom:15px;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px 0;
border-top:1px solid var(--border);
text-align:left;
}

input,select,textarea{
background:#09090b;
border:1px solid var(--border);
color:white;
padding:8px;
border-radius:6px;
width:100%;
margin-bottom:10px;
}

button{
background:var(--accent);
border:none;
padding:10px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.btn-outline{
background:none;
border:1px solid var(--border);
}

.progress-bar{
height:6px;
background:var(--border);
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:var(--accent);
}

#timer-display{
font-size:3rem;
text-align:center;
margin:20px 0;
}

.active-session{
border-color:var(--accent);
box-shadow:0 0 20px rgba(59,130,246,.4);
}

.tag{
background:var(--border);
padding:4px 8px;
border-radius:4px;
font-size:.75rem;
}

@media(max-width:768px){
.col-4,.col-6,.col-8{grid-column:span 12;}
}

</style>
</head>

<body>

<div class="container">

<header>

<div>
<h1>MOMENTUM OS</h1>
<p id="identity-banner" style="color:var(--text-dim);font-size:.9rem;">
Select your identity to begin...
</p>
</div>

<select id="identity-select" onchange="updateIdentity()">
<option value="">Choose Identity</option>
<option>Builder</option>
<option>Scholar</option>
<option>Athlete</option>
<option>Trader</option>
</select>

</header>

<div class="grid">

<!-- MOMENTUM TRACKER -->

<div class="card col-8">

<h2>Momentum Tracker</h2>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">

<input id="momentum-date" type="date">
<input id="momentum-tasks" type="number" placeholder="Tasks completed">
<input id="momentum-score" type="number" placeholder="Momentum score">

<button onclick="addMomentum()">Add Entry</button>
<button class="btn-outline" onclick="setToday()">Today</button>

</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Tasks</th>
<th>Score</th>
</tr>
</thead>

<tbody id="momentum-body"></tbody>

</table>

</div>

<!-- LIFE DASHBOARD -->

<div class="card col-4">

<h2>Life Dashboard</h2>

<p>Health</p>
<div class="progress-bar"><div class="progress-fill" style="width:70%"></div></div>

<p style="margin-top:10px">Learning</p>
<div class="progress-bar"><div class="progress-fill" style="width:50%"></div></div>

<p style="margin-top:10px">Work</p>
<div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>

</div>

<!-- EXECUTION -->

<div class="card col-6" id="execution-card">

<h2>Today's Execution</h2>

<input placeholder="1. High impact task">
<input placeholder="2. Secondary objective">
<input placeholder="3. Maintenance task">

<div id="timer-display">25:00</div>

<div style="display:flex;gap:10px">
<button id="start-btn" onclick="toggleTimer()">Start Focus Session</button>
<button class="btn-outline" onclick="resetTimer()">Reset</button>
</div>

</div>

<!-- FOCUS ROOM -->

<div class="card col-6">

<h2>Focus Room</h2>

<p>Completed Today</p>
<p id="session-count" style="font-size:2rem">0 Sessions</p>

</div>

<!-- MINIMUM ACTION -->

<div class="card col-12">

<h2>Minimum Action System</h2>

<table>

<thead>
<tr>
<th>Goal</th>
<th>Minimum Action</th>
</tr>
</thead>

<tbody id="min-action-body"></tbody>

</table>

<div style="display:flex;gap:10px;margin-top:10px">

<input id="new-goal" placeholder="Goal">
<input id="new-action" placeholder="Minimum Action">

<button onclick="addRow()">Add</button>

</div>

</div>

</div>
</div>

<script>

let timeLeft=1500
let timerId=null
let sessionsCompleted=0

window.onload=()=>{

renderMomentum()

const savedIdentity=localStorage.getItem("userIdentity")

if(savedIdentity){
document.getElementById("identity-select").value=savedIdentity
updateIdentity()
}

const savedActions=JSON.parse(localStorage.getItem("minActions"))||[]

const tbody=document.getElementById("min-action-body")

savedActions.forEach(a=>{
tbody.innerHTML+=`
<tr>
<td>${a.goal}</td>
<td><span class="tag">${a.action}</span></td>
</tr>`
})

updateTimerDisplay()

}

function updateIdentity(){

const select=document.getElementById("identity-select")
const banner=document.getElementById("identity-banner")

if(select.value){

banner.innerHTML=`You are acting as a <b style="color:#3b82f6">${select.value}</b> today.`

localStorage.setItem("userIdentity",select.value)

}else{

banner.innerText="Select your identity to begin..."
localStorage.removeItem("userIdentity")

}

}

function addRow(){

const goal=document.getElementById("new-goal").value.trim()
const action=document.getElementById("new-action").value.trim()

if(!goal||!action)return

const saved=JSON.parse(localStorage.getItem("minActions"))||[]

saved.push({goal,action})

localStorage.setItem("minActions",JSON.stringify(saved))

location.reload()

}

function updateTimerDisplay(){

const mins=Math.floor(timeLeft/60)
const secs=timeLeft%60

document.getElementById("timer-display").textContent=
`${mins.toString().padStart(2,"0")}:${secs.toString().padStart(2,"0")}`

}

function toggleTimer(){

const btn=document.getElementById("start-btn")
const card=document.getElementById("execution-card")

if(timerId){

clearInterval(timerId)
timerId=null
btn.textContent="Start Focus Session"
card.classList.remove("active-session")

}else{

btn.textContent="Pause Session"
card.classList.add("active-session")

timerId=setInterval(()=>{

timeLeft--
updateTimerDisplay()

if(timeLeft<=0){

clearInterval(timerId)
timerId=null

sessionsCompleted++

document.getElementById("session-count").textContent=
sessionsCompleted+" Sessions"

alert("Focus session complete!")

resetTimer()

}

},1000)

}

}

function resetTimer(){

clearInterval(timerId)
timerId=null
timeLeft=1500
updateTimerDisplay()

document.getElementById("execution-card").classList.remove("active-session")
document.getElementById("start-btn").textContent="Start Focus Session"

}

function setToday(){

const today=new Date().toISOString().split("T")[0]

document.getElementById("momentum-date").value=today

}

function addMomentum(){

const date=document.getElementById("momentum-date").value
const tasks=document.getElementById("momentum-tasks").value
const score=document.getElementById("momentum-score").value

if(!date||!tasks||!score)return

const stored=JSON.parse(localStorage.getItem("momentumData"))||[]

stored.push({date,tasks,score})

stored.sort((a,b)=>new Date(b.date)-new Date(a.date))

localStorage.setItem("momentumData",JSON.stringify(stored))

renderMomentum()

document.getElementById("momentum-tasks").value=""
document.getElementById("momentum-score").value=""

}

function renderMomentum(){

const tbody=document.getElementById("momentum-body")

tbody.innerHTML=""

const stored=JSON.parse(localStorage.getItem("momentumData"))||[]

stored.forEach(item=>{

const date=new Date(item.date).toLocaleDateString()

tbody.innerHTML+=`
<tr>
<td>${date}</td>
<td>${item.tasks}</td>
<td style="color:#10b981">+${item.score}</td>
</tr>
`

})

}

</script>

</body>
</html>
